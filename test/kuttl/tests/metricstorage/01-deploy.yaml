---
apiVersion: telemetry.openstack.org/v1beta1
kind: MetricStorage
metadata:
  name: telemetry-kuttl
spec:
  dashboardsEnabled: true
  monitoringStack:
    alertingEnabled: true
    scrapeInterval: 30s
    storage:
      strategy: persistent
      retention: 24h
      persistent:
        pvcStorageRequest: 20G
  networkAttachments: []
---
# Required, so that the instanceha scrapeconfig is created
apiVersion: v1
kind: Service
metadata:
  name: instanceha-0-metrics
  labels:
    metrics: enabled
    service: instanceha
spec:
  ports:
  - name: metrics
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    service: instanceha
---
# Required, so that the mysqld_exporter scrapeconfig is created
apiVersion: telemetry.openstack.org/v1beta1
kind: Ceilometer
metadata:
  name: ceilometer
spec:
  secret: osp-secret
  mysqldExporterEnabled: true
  notificationsBus:
    cluster: rabbitmq
