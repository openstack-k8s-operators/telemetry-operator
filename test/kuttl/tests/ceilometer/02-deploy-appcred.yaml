apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -euo pipefail
      NS="${NAMESPACE}"

      # Save current pod UID to detect restart
      old_pod_uid=$(oc get pod -n "${NS}" ceilometer-0 -o jsonpath='{.metadata.uid}')
      oc create configmap appcred-ceilometer-pre \
        --from-literal=pod_uid="${old_pod_uid}" \
        --dry-run=client -o yaml | oc apply -n "${NS}" -f -

      # Create KeystoneApplicationCredential
      cat <<'EOF' | oc apply -n "${NS}" -f -
      apiVersion: keystone.openstack.org/v1beta1
      kind: KeystoneApplicationCredential
      metadata:
        name: ac-ceilometer
      spec:
        secret: osp-secret
        passwordSelector: CeilometerPassword
        userName: ceilometer
        roles:
          - admin
          - service
        unrestricted: false
      EOF

      echo "Waiting for KeystoneApplicationCredential ac-ceilometer to be Ready..."
      oc wait -n "${NS}" appcred/ac-ceilometer --for=condition=Ready --timeout=300s

      ac_secret_name=$(oc get -n "${NS}" appcred/ac-ceilometer -o jsonpath='{.status.secretName}')
      if [ -z "${ac_secret_name}" ]; then
        echo "ERROR: appcred/ac-ceilometer.status.secretName is empty"
        exit 1
      fi
      echo "AC secret name: ${ac_secret_name}"

      # Patch Ceilometer to use application credential
      oc patch ceilometer telemetry-kuttl -n "${NS}" --type=merge \
        -p "{\"spec\":{\"auth\":{\"applicationCredentialSecret\":\"${ac_secret_name}\"}}}"
