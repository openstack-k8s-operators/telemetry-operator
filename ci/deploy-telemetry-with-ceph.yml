---
- name: "Deploy telemetry in a job with ceph"
  hosts: "{{ cifmw_target_hook_host | default('localhost')  }}"
  gather_facts: false
  environment:
    KUBECONFIG: "{{ cifmw_openshift_kubeconfig }}"
    PATH: "{{ cifmw_path }}"
  tasks:
    - name: Copy dataplane nodeset kustomization
      ansible.builtin.copy:
        dest: "{{ cifmw_basedir }}/artifacts/manifests/kustomizations/dataplane/60-kustomize-dataplane-telemetry-service.yaml"
        content: |-
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          namespace: {{ cifmw_install_yamls_defaults['NAMESPACE'] }}
          patches:
          - target:
              kind: OpenStackDataPlaneNodeSet
              name: .*
            patch: |-
              - op: add
                path: /spec/services/-
                value: install-certs
              - op: add
                path: /spec/services/-
                value: ovn
              - op: add
                path: /spec/services/-
                value: libvirt
              - op: add
                path: /spec/services/-
                value: telemetry
              - op: add
                path: /spec/services/-
                value: telemetry-power-monitoring
