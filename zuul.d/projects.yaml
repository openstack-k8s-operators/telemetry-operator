---
- job:
    name: telemetry-openstack-meta-content-provider-all-services-master
    parent: openstack-meta-content-provider-master
    description: |
      Meta content provider that builds telemetry-operator images and all
      OpenStack containers from master for early RHOSO 19 testing.
    vars:
      cifmw_build_containers_force: true
      cifmw_bop_dlrn_from_source: true
      cifmw_build_containers_registry_namespace: podified-master-centos10
      cifmw_operator_build_operators:
        - name: telemetry-operator
          src: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/telemetry-operator"
        - name: openstack-operator
          src: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/openstack-operator"
          image_base: telemetry
      cifmw_build_containers_image_tag: telemetry_latest
      # FIXME:Remove horizontest from being excluded when it would be stable
      # to build on CentOS 10.
      cifmw_build_containers_exclude_containers:
        master:
          centos10:
            - horizontest

- job:
    name: telemetry-openstack-meta-content-provider-master
    parent: openstack-meta-content-provider-master
    description: |
      Meta content provider that builds telemetry-operator images and only
      telemetry-related OpenStack containers (aodh, ceilometer, cloudkitty,
      heat). Core OpenStack images are left on antelope/RHOSO
      18-like tags.
    vars:
      # Note(Chandan Kumar): image_base is the operator name without -operator.
      # It is needed by openstack-operator to include telemetry operator images
      # in the openstack-operator catalog image.
      cifmw_build_containers_force: true
      cifmw_bop_dlrn_from_source: true
      cifmw_build_containers_registry_namespace: podified-master-centos10
      cifmw_operator_build_operators:
        - name: telemetry-operator
          src: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/telemetry-operator"
        - name: openstack-operator
          src: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/openstack-operator"
          image_base: telemetry
      cifmw_build_containers_image_tag: telemetry_latest
      # Build only telemetry-related containers listed in ci/files/containers.yaml
      # (aodh, ceilometer, cloudkitty, heat). Exclude everything
      # else so core OpenStack stays on antelope/RHOSO 18-like images.
      cifmw_build_containers_exclude_containers:
        master:
          centos10:
            # core OpenStack
            - keystone
            - glance-api
            - nova-api
            - nova-scheduler
            - nova-conductor
            - nova-compute
            - nova-novncproxy
            - neutron-server
            - neutron-dhcp-agent
            - neutron-ovn-agent
            - neutron-metadata-agent-ovn
            - neutron-sriov-agent
            - cinder-api
            - cinder-scheduler
            - cinder-volume
            - cinder-backup
            - placement-api
            - horizon
            - horizontest
            - openstackclient
            # infrastructure
            - mariadb
            - rabbitmq
            - memcached
            - redis
            - valkey
            - haproxy
            - rsyslog
            - cron
            - netutils
            - frr
            - ovn-controller
            - ovn-nb-db-server
            - ovn-sb-db-server
            - ovn-northd
            - ovn-bgp-agent
            - iscsid
            - multipathd
            # DNS-as-a-service
            - designate-api
            - designate-central
            - designate-worker
            - designate-mdns
            - designate-producer
            - designate-backend-bind9
            - designate-sink
            - unbound
            # file shares
            - manila-api
            - manila-scheduler
            - manila-share
            # load balancing
            - octavia-api
            - octavia-worker
            - octavia-housekeeping
            - octavia-health-manager
            # bare metal
            - ironic-api
            - ironic-conductor
            - ironic-inspector
            - ironic-neutron-agent
            - ironic-pxe
            # key manager service
            - barbican-api
            - barbican-keystone-listener
            - barbican-worker
            # object storage
            - swift-account
            - swift-container
            - swift-object
            - swift-proxy-server
            # optimization
            - watcher-api
            - watcher-applier
            - watcher-decision-engine
            # CI / test images
            - ansible-tests
            - tobiko

- job:
    name: telemetry-operator-multinode-autoscaling
    parent: podified-multinode-edpm-deployment-crc
    dependencies:
      - openstack-k8s-operators-content-provider
    description: |
      Deploy OpenStack with Autoscaling features enabled.
    vars:
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-autoscaling.yml"
    irrelevant-files: &irrelevant_files
      - .github/.*
      - ci/github/.*
      - callback_plugins/.*
      - docs/.*
      - README*
      - OWNERS*
      - .*/*.md
      - roles/client_side_tests/.*
      - roles/test_alerts/.*
      - roles/test_collectd/.*
      - roles/test_metrics_retention/.*
      - roles/test_observability_strategy/.*
      - roles/test_qdr/.*
      - roles/test_sensubility/.*
      - roles/test_snmp_traps/.*
      - roles/test_verify_email/.*
      - test/.*
      - ^LICENSE$
      - ^PROJECT$
      - ^README.md$
      - ^renovate.json$
      - ^kuttl-test.yaml$
      - .pre-commit-config.yaml
      - .ci-operator.yaml
      - .dockerignore
      - .gitignore
      - .golangci.yaml

- job:
    name: telemetry-operator-multinode-autoscaling-tempest
    parent: telemetry-operator-multinode-autoscaling
    vars:
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-autoscaling.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-autoscaling-tempest.yml"
    irrelevant-files: *irrelevant_files

- job:
    name: telemetry-operator-multinode-default-telemetry
    parent: podified-multinode-edpm-deployment-crc
    dependencies:
      - openstack-k8s-operators-content-provider
    description: |
      Deploy a default OpenStack with telemetry enabled, but without COO installed. Check that the telemetry-operator logs don't have any errors.
    extra-vars: &mcp_extra_vars
      # Override zuul meta content provider provided content_provider_dlrn_md5_hash
      # var. As returned dlrn md5 hash comes from master release but job is using
      # antelope content.
      content_provider_dlrn_md5_hash: ''

    vars:
      cifmw_update_containers: false
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-default-telemetry.yml"
    irrelevant-files: *irrelevant_files
    required-projects:
      - name: infrawatch/feature-verification-tests
        override-checkout: master

- job:
    name: telemetry-operator-multinode-logging
    parent: podified-multinode-edpm-deployment-crc
    dependencies:
      - openstack-k8s-operators-content-provider
    description: |
      Deploy OpenStack with Logging features enabled
    vars:
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-logging.yml"
    irrelevant-files: *irrelevant_files

- job:
    name: telemetry-operator-multinode-audit-logging
    parent: podified-multinode-edpm-deployment-crc
    dependencies:
      - openstack-k8s-operators-content-provider
    description: |
      Deploy OpenStack with CADF audit logging enabled for supported services
    vars:
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-audit-logging.yml"
    irrelevant-files: *irrelevant_files

- job:
    name: telemetry-operator-multinode-power-monitoring
    parent: podified-multinode-edpm-deployment-crc
    dependencies:
      - openstack-k8s-operators-content-provider
    description: |
      Deploy OpenStack with power monitoring services enabled
    vars:
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir  }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-power-monitoring.yml"
    irrelevant-files: *irrelevant_files

- job:
    name: telemetry-operator-multinode-cloudkitty
    dependencies:
      - telemetry-openstack-meta-content-provider-master
    parent: telemetry-operator-multinode-autoscaling
    description: |
      Deploy CloudKitty with telemetry services built from master and run
      tempest tests. Uses telemetry-openstack-meta-content-provider-master,
      so only aodh, ceilometer, cloudkitty, heat are rebuilt;
      core OpenStack stays on antelope/RHOSO 18-like images.
    required-projects:
      - name: infrawatch/feature-verification-tests
        override-checkout: master
    extra-vars: *mcp_extra_vars
    vars:
      #patch_observabilityclient: true
      cifmw_repo_setup_branch: master
      fetch_dlrn_hash: false
      cifmw_update_containers: true
      cifmw_update_containers_openstack: true
      cifmw_update_containers_org: podified-master-centos10
      cifmw_update_containers_tag: telemetry_latest
      cifmw_extras:
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir }}/scenarios/centos-9/multinode-ci.yml"
        - "@{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/telemetry-operator'].src_dir }}/ci/vars-cloudkitty-tempest.yml"
    roles:
      - zuul: github.com/openstack-k8s-operators/ci-framework
    irrelevant-files: *irrelevant_files

- job:
    name: telemetry-operator-multinode-master
    dependencies:
      - telemetry-openstack-meta-content-provider-all-services-master
    parent: telemetry-operator-multinode-cloudkitty
    description: |
      Deploy CloudKitty with all OpenStack services built from master and run
      tempest tests. Uses telemetry-openstack-meta-content-provider-all-services-master
      for early RHOSO 19 integration testing.

- project-template:
    name: rdo-telemetry-tempest-plugin-jobs
    openstack-experimental:
      jobs:
        - telemetry-operator-multinode-autoscaling-tempest:
            dependencies: []
            # Required because RDO and openstack repos use master as their default branch and also try to check out master for all the projects included in a job.
            required-projects:
              - name: openstack-k8s-operators/ci-framework
                override-checkout: main
              - name: openstack-k8s-operators/install_yamls
                override-checkout: main
              - name: openstack-k8s-operators/infra-operator
                override-checkout: main
              - name: openstack-k8s-operators/openstack-baremetal-operator
                override-checkout: main
              - name: openstack-k8s-operators/openstack-must-gather
                override-checkout: main
              - name: openstack-k8s-operators/openstack-operator
                override-checkout: main
              - name: openstack-k8s-operators/repo-setup
                override-checkout: main
              - name: openstack-k8s-operators/edpm-ansible
                override-checkout: main
            pre-run:
              - ci/debug-get-branch-for-telemetry-tempest-plugin.yml

- project:
    name: openstack-k8s-operators/telemetry-operator
    github-check:
      jobs:
        # jobs uses latest available code just for telemetry
        # services - local registry, tag: telemetry_latest
        # All other services including OpenStack core services
        # would not be recreated.
        - telemetry-openstack-meta-content-provider-master
        - telemetry-operator-multinode-cloudkitty
        # job uses latest code for all OpenStack services - including
        # core services
        - telemetry-openstack-meta-content-provider-all-services-master
        - telemetry-operator-multinode-master
        # jobs uses latest stable code - tag: current-podified
        - openstack-k8s-operators-content-provider:
            vars:
              cifmw_install_yamls_sdk_version: v1.41.1
        - telemetry-operator-multinode-default-telemetry
        - telemetry-operator-multinode-audit-logging
        - functional-tests-osp18: &fvt_jobs_config
            voting: true
            required-projects:
              - name: infrawatch/feature-verification-tests
                override-checkout: master
            irrelevant-files: *irrelevant_files
        - feature-verification-tests-noop:
            files: *irrelevant_files
        - functional-periodic-telemetry-with-ceph:
            required-projects:
              - name: infrawatch/feature-verification-tests
                override-checkout: master
            files:
              - ci/deploy-telemetry-with-ceph.yml
              - ci/vars-telemetry-with-ceph.yml
              - zuul.d/projects.yaml
