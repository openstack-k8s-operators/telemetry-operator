[oslo_policy]
policy_file = policy.yaml

[DEFAULT]
auth_strategy = keystone
debug = True
notification_topics = notifications
transport_url = {{ .TransportURL }}

[authinfos]
debug = True
project_domain_name = default
user_domain_name = default
region_name = RegionOne
tenant_name = service
project_name = service
password = {{ .ServicePassword }}
username = {{ .ServiceUser }}
identity_uri = {{ .KeystoneInternalURL }}
auth_url = {{ .KeystoneInternalURL }}
auth_protocol = http
auth_type = v3password
{{- if .TLS }}
cafile = {{ .CAFile }}
{{- end }}

[fetcher]
backend = keystone

[fetcher_keystone]
auth_section = authinfos
ignore_rating_role = True

[storage_influxdb]
version = 2
token = cloudkitty
org = openstack
bucket = cloudkitty
url = http://influxdb:8086

[collect]
period = 300
wait_periods = 0
metrics_conf = /etc/cloudkitty/metrics.yaml
collector = prometheus
scope_key = project

[collector_prometheus]
{{- if .TLS }}
prometheus_url = https://{{ .PrometheusHost }}:{{ .PrometheusPort }}/api/v1
cafile = {{ .CAFile }}
insecure = false
{{- else }}
prometheus_url = http://{{ .PrometheusHost }}:{{ .PrometheusPort }}/api/v1
insecure = true
{{- end }}

[output]
pipeline = osrf
basepath = /opt/stack/data/cloudkitty/reports
backend = cloudkitty.backend.file.FileBackend

[storage]
version = 2
backend = loki

[storage_loki]
url = https://{{ .LokiHost  }}:{{ .LokiPort }}/api/logs/v1/cloudkitty/loki/api/v1
ca_file = /etc/cloudkitty/certs/service-ca.crt
cert_file = /etc/cloudkitty/certs/tls.crt
key_file = /etc/cloudkitty/certs/tls.key

[database]
connection = {{ .DatabaseConnection }}

[keystone_authtoken]
memcached_servers = {{ .MemcachedServersWithInet }}
# memcache_pool_dead_retry = 10
# memcache_pool_conn_get_timeout = 2
project_domain_name = Default
project_name = service
user_domain_name = Default
password = {{ .ServicePassword }}
username = {{ .ServiceUser }}
auth_url = {{ .KeystoneInternalURL }}
interface = internal
auth_type = password
{{- if .TLS }}
cafile = {{ .CAFile }}
{{- end }}
# service_token_roles_required = true

[orchestrator]

# Max number of workers to execute the rating process. Defaults to the
# number of available CPU cores. (integer value)
# Minimum value: 0
#
# This option has a sample default set, which means that
# its actual default value may vary from the one documented
# below.
max_workers = 2

# Max number of workers to execute the reprocessing. Defaults to the
# number of available CPU cores. (integer value)
# Minimum value: 0
max_workers_reprocessing = 2

# Maximal number of threads to use per worker. Defaults to 5 times the
# number of available CPUs (integer value)
# Minimum value: 1
# Deprecated group/name - [orchestrator]/max_greenthreads
# Advanced Option: intended for advanced users and not used
# by the majority of users, and might have a significant
# effect on stability and/or performance.
#
# This option has a sample default set, which means that
# its actual default value may vary from the one documented
# below.
max_threads = 2
